<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Home</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }

    /* 상단 헤더 */
    .header {
      background: linear-gradient(to right, #5f2c82, #49a09d);
      color: white;
      padding: 15px;
      font-size: 20px;
      display: flex;
      align-items: center;
    }

    .menu {
      margin-right: 10px;
      font-size: 24px;
      cursor: pointer;
    }

    .container {
      padding: 20px;
    }

    h3 {
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      height: 80px;
      border-radius: 8px;
      border: 1px solid #ccc;
      padding: 10px;
      font-size: 14px;
      resize: none;
    }

    .btn {
      display: block;
      margin: 15px auto;
      padding: 8px 20px;
      background-color: #666;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .result-box {
      position: relative;
    }

    .copy {
      position: absolute;
      right: 10px;
      top: -25px;
      font-size: 12px;
      cursor: pointer;
      color: gray;
    }

    .ad {
      margin-top: 20px;
      background-color: #d64545;
      color: white;
      text-align: center;
      padding: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="menu">☰</div>
    Home
  </div>

  <div class="container">

    <h3>입력하기</h3>
    <textarea placeholder="만들고 싶은 수식"></textarea>

    <button class="btn">제출</button>

    <h3>출력결과</h3>
    <div class="result-box">
      <div class="copy">복사하기</div>
      <textarea readonly>[response]</textarea>
    </div>

    <div class="ad">[ADMOB BANNER]</div>

  </div>

</body>
</html>
